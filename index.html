<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OGAWA GREEN｜庭の整理・草刈り・剪定・伐採抜根</title>
<meta name="description" content="小川町・越生町・鳩山町・ときがわ町を中心に、庭の整理・草刈り・剪定・刈り込み・伐採・抜根に対応。若さと行動力で丁寧に対応します。見積もり無料。">
<style>
:root{
  --green:#2e7d32;
  --green-soft:#72c075;
  --green-pale:#eff9ee;
  --green-bg:#f7fbf6;
  --green-deep:#215c28;
  --yellow:#f4d96b;
  --text:#2d332d;
  --white:#ffffff;
  --shadow:0 10px 30px rgba(46,125,50,.10);
  --radius:24px;
}
*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  margin:0;
  font-family:"Yu Gothic","Hiragino Kaku Gothic ProN","Meiryo",sans-serif;
  color:var(--text);
  background:linear-gradient(180deg,#f9fdf8 0%,#f3faf2 100%);
  line-height:1.85;
  padding-bottom:88px;
}
a{text-decoration:none;color:inherit;}
img{max-width:100%;display:block;height:auto;}

/* loading */
#loading{
  position:fixed;
  inset:0;
  background:#ffffff;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  gap:16px;
  z-index:9999;
  transition:opacity .5s ease, visibility .5s ease;
}
#loading.hide{opacity:0;visibility:hidden;}
.loadingLogoWrap{
  width:108px;height:108px;border-radius:28px;
  border:4px solid var(--green);
  display:flex;align-items:center;justify-content:center;
  box-shadow:var(--shadow);
  animation:popIn .9s ease both, floatY 2.8s ease-in-out infinite;
  background:#fff;
}
.loadingLogo{
  font-size:44px;font-weight:800;color:var(--green);
  letter-spacing:.04em;
}
.loadingText{font-weight:700;color:var(--green-deep);letter-spacing:.08em;}
@keyframes popIn{0%{transform:scale(.85);opacity:0;}100%{transform:scale(1);opacity:1;}}
@keyframes floatY{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}

/* decorative */
.bgLeaf,
.bgLeaf2,
.bgLeaf3{
  position:absolute;
  opacity:.18;
  pointer-events:none;
  animation:leafFloat 4s ease-in-out infinite;
}
.bgLeaf{top:28px;left:20px;font-size:42px;}
.bgLeaf2{top:36px;right:28px;font-size:36px;animation-delay:.8s;}
.bgLeaf3{bottom:10px;right:16%;font-size:30px;animation-delay:1.4s;}
@keyframes leafFloat{0%,100%{transform:translateY(0) rotate(0deg);}50%{transform:translateY(-10px) rotate(4deg);}}

header{
  position:relative;
  overflow:hidden;
  padding:28px 16px 56px;
}
.topbar{
  max-width:1100px;
  margin:0 auto 18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:16px;
  background:rgba(255,255,255,.75);
  backdrop-filter:blur(10px);
  border:1px solid rgba(114,192,117,.25);
  box-shadow:var(--shadow);
  border-radius:999px;
  padding:12px 18px;
}
.brandMini{display:flex;align-items:center;gap:12px;font-weight:800;color:var(--green-deep);}
.brandMiniLogo{
  width:44px;height:44px;border-radius:14px;background:#fff;border:2px solid var(--green);
  display:grid;place-items:center;color:var(--green);font-weight:800;
}
.topLinks{display:flex;gap:10px;flex-wrap:wrap;}
.topLinks a{
  padding:10px 16px;border-radius:999px;font-weight:700;font-size:14px;
  background:#fff;border:1px solid rgba(46,125,50,.12);
}
.hero{
  max-width:1100px;
  margin:0 auto;
  display:grid;
  grid-template-columns:1.1fr .9fr;
  gap:24px;
  align-items:center;
}
.heroText,
.heroCard{
  background:rgba(255,255,255,.86);
  backdrop-filter:blur(8px);
  border-radius:32px;
  box-shadow:var(--shadow);
  border:1px solid rgba(114,192,117,.18);
}
.heroText{padding:40px 34px;position:relative;overflow:hidden;}
.kicker{
  display:inline-block;
  background:var(--green-pale);
  color:var(--green);
  border-radius:999px;
  padding:8px 14px;
  font-weight:700;
  font-size:14px;
  margin-bottom:14px;
}
.hero h1{
  margin:0 0 12px;
  font-size:clamp(32px,5vw,52px);
  line-height:1.28;
  color:var(--green-deep);
}
.heroLead{
  font-size:18px;
  margin:0 0 20px;
}
.pointRow{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin:20px 0 0;
}
.pointRow span{
  background:#fff;
  border:1px solid rgba(46,125,50,.14);
  border-radius:999px;
  padding:10px 14px;
  font-weight:700;
  font-size:14px;
}
.btnWrap{display:flex;flex-wrap:wrap;gap:12px;margin-top:22px;}
.btn,
.btnLine,
.btnGhost{
  display:inline-flex;align-items:center;justify-content:center;
  min-height:54px;padding:14px 24px;border-radius:999px;font-weight:800;
  transition:transform .2s ease, box-shadow .2s ease, background .2s ease;
}
.btn:hover,.btnLine:hover,.btnGhost:hover{transform:translateY(-2px);box-shadow:0 10px 20px rgba(0,0,0,.10);}
.btn{background:var(--green);color:#fff;}
.btnLine{background:#06c755;color:#fff;}
.btnGhost{background:#fff;color:var(--green);border:1px solid rgba(46,125,50,.18);}
.heroCard{padding:28px;position:relative;}
.heroLogo{
  width:124px;height:124px;margin:0 auto 16px;border-radius:30px;
  border:4px solid var(--green);background:#fff;display:grid;place-items:center;
  color:var(--green);font-size:46px;font-weight:800;box-shadow:var(--shadow);
  animation:floatY 3s ease-in-out infinite;
}
.heroCard h2{margin:0 0 10px;text-align:center;color:var(--green-deep);font-size:30px;}
.heroCard p{margin:0;text-align:center;}
.heroBadges{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:22px;}
.heroBadge{
  background:var(--green-bg);border-radius:20px;padding:16px;text-align:center;
  font-weight:700;border:1px solid rgba(46,125,50,.10);
}
.wave{height:48px;background:radial-gradient(circle at 20px -10px, transparent 32px, #fff 33px) repeat-x;background-size:56px 48px;margin-top:-18px;}

main{max-width:1100px;margin:0 auto;padding:0 16px 28px;}
section{
  background:#fff;
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:34px 28px;
  margin:18px 0;
  position:relative;
  overflow:hidden;
}
.sectionLabel{
  display:inline-block;
  margin-bottom:10px;
  font-size:13px;
  font-weight:800;
  color:var(--green);
  letter-spacing:.08em;
}
h2{
  margin:0 0 18px;
  font-size:clamp(26px,3vw,36px);
  color:var(--green-deep);
  line-height:1.35;
}
.subText{margin:0 0 18px;color:#506050;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.softBox{
  background:linear-gradient(180deg,#fbfffa 0%,#f2f9f1 100%);
  border:1px solid rgba(46,125,50,.10);
  border-radius:22px;
  padding:22px;
}
.softBox h3{margin:0 0 12px;color:var(--green);font-size:22px;}
.serviceGrid,
.strengthGrid,
.caseGrid,
.priceGrid{
  display:grid;grid-template-columns:repeat(2,1fr);gap:18px;
}
.card{
  background:#fff;
  border:1px solid rgba(46,125,50,.10);
  border-radius:22px;
  padding:22px;
  box-shadow:0 8px 20px rgba(46,125,50,.05);
}
.cardIcon{
  width:54px;height:54px;border-radius:18px;background:var(--green-pale);
  display:grid;place-items:center;font-size:26px;margin-bottom:14px;
}
.card h3{margin:0 0 10px;font-size:23px;color:var(--green-deep);}
.card p{margin:0;color:#546154;}
.strengthGrid .card{background:linear-gradient(180deg,#fff 0%,#fbfffb 100%);}
.caseCard{padding:0;overflow:hidden;}
.caseHeader{padding:18px 18px 0;}
.caseHeader h3{margin:0 0 8px;color:var(--green-deep);}
.caseImgWrap{padding:18px;display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.casePhoto{
  border-radius:18px;
  min-height:180px;
  background:linear-gradient(135deg,#e9f8e8,#f8fff7);
  border:2px dashed rgba(46,125,50,.20);
  display:flex;align-items:center;justify-content:center;
  text-align:center;font-weight:700;color:#6b876b;padding:16px;
}
.caseNote{padding:0 18px 18px;color:#546154;}
.priceCard{
  background:linear-gradient(180deg,#f8fff8 0%,#eef8ed 100%);
  border:1px solid rgba(46,125,50,.12);
  border-radius:22px;padding:22px;
}
.priceCard h3{margin:0 0 12px;color:var(--green-deep);font-size:22px;}
.priceLine{display:flex;justify-content:space-between;gap:16px;padding:10px 0;border-bottom:1px dashed rgba(46,125,50,.16);}
.priceLine:last-child{border-bottom:none;}
.priceLine strong{color:var(--green-deep);}
.notice{
  background:#fff8da;border:1px solid #f2e39a;color:#7f6620;
  padding:14px 16px;border-radius:18px;font-weight:700;margin-top:14px;
}
.areaBox,
.companyBox,
.contactBox{background:var(--green-bg);border:1px solid rgba(46,125,50,.10);border-radius:22px;padding:24px;}
.areaList{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:16px;}
.areaItem{background:#fff;border-radius:16px;padding:14px 16px;font-weight:700;border:1px solid rgba(46,125,50,.08);}
.companyGrid{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.companyInfo dl{margin:0;display:grid;grid-template-columns:110px 1fr;gap:12px 16px;}
.companyInfo dt{font-weight:800;color:var(--green-deep);}
.companyInfo dd{margin:0;}
.map iframe{width:100%;height:100%;min-height:300px;border:0;border-radius:20px;}
.contactBox{text-align:center;}
.tel{font-size:clamp(26px,4vw,38px);font-weight:900;color:var(--green-deep);margin:8px 0 14px;}
.contactBtns{display:flex;justify-content:center;flex-wrap:wrap;gap:12px;margin-top:18px;}
footer{
  text-align:center;padding:28px 16px 110px;color:#5d6b5d;font-weight:700;
}
.fixedBar{
  position:fixed;left:0;right:0;bottom:0;z-index:999;
  background:rgba(255,255,255,.95);backdrop-filter:blur(12px);
  border-top:1px solid rgba(46,125,50,.12);
  display:flex;gap:10px;padding:10px;
}
.fixedBar a{
  flex:1;display:flex;align-items:center;justify-content:center;
  min-height:50px;border-radius:999px;color:#fff;font-weight:800;
}
.call{background:var(--green);}
.line{background:#06c755;}
.small{font-size:14px;color:#627062;}

@media (max-width: 900px){
  .hero,.grid2,.companyGrid,.serviceGrid,.strengthGrid,.caseGrid,.priceGrid{grid-template-columns:1fr;}
  .heroBadges{grid-template-columns:1fr 1fr;}
}
@media (max-width: 640px){
  body{font-size:15px;}
  header{padding:16px 12px 42px;}
  .topbar{border-radius:22px;padding:12px 14px;align-items:flex-start;flex-direction:column;}
  .topLinks{width:100%;}
  .topLinks a{font-size:13px;padding:9px 12px;}
  .heroText,.heroCard,section{padding:22px 18px;border-radius:24px;}
  .btnWrap,.contactBtns{flex-direction:column;}
  .btn,.btnLine,.btnGhost{width:100%
