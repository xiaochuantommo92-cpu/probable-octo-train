<!DOCTYPE html>
<html lang="ja">
<head>

<title>OGAWA GREEN｜庭の整理・草刈り・剪定</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:#f5fff5;
color:#333;
}

/* ロゴアニメーション */

#logo-screen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
animation:fadeout 2s forwards;
animation-delay:2s;
}

.logo{
font-size:60px;
font-weight:bold;
color:#2e7d32;
}

@keyframes fadeout{
to{opacity:0;visibility:hidden;}
}

/* ヘッダー */

header{
background:linear-gradient(#7ed957,#2e7d32);
color:white;
text-align:center;
padding:80px 20px;
}

header h1{
font-size:40px;
margin:0;
}

header p{
font-size:18px;
margin-top:10px;
}

/* セクション */

section{
padding:50px 20px;
max-width:900px;
margin:auto;
}

h2{
text-align:center;
color:#2e7d32;
}

/* サービス */

.services{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-top:30px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
text-align:center;
}

/* ボタン */

.btn{
display:inline-block;
margin-top:20px;
background:#2e7d32;
color:white;
padding:15px 30px;
border-radius:8px;
text-decoration:none;
}

/* フッター */

footer{
background:#2e7d32;
color:white;
text-align:center;
padding:20px;
margin-top:40px;
}

</style>
</head>

<div id="logo-screen">
<div class="logo">OG</div>
</div>

<div class="services">

<div class="card">

</div>

<div class="card">

</div>

<div class="card">

</div>

</div>

小川町 / ときがわ町 / 越生町 / 鳩山町
</p>

電話する
</a>

<footer>

<p>OGAWA GREEN</p>
